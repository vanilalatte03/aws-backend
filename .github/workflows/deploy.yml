name: Deploy

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 17

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build and test
        run: ./gradlew clean test bootJar

      - name: Login to Docker Hub
        env:
          DOCKER_IMAGE: ${{ vars.DOCKER_IMAGE }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "$DOCKERHUB_TOKEN" | docker login -u "${DOCKER_IMAGE%%/*}" --password-stdin

      - name: Build and push Docker image
        run: |
          docker build -t ${{ vars.DOCKER_IMAGE }}:latest .
          docker push ${{ vars.DOCKER_IMAGE }}:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ vars.DOCKER_IMAGE }}:latest
            docker stop ${{ vars.CONTAINER_NAME }} || true
            docker rm ${{ vars.CONTAINER_NAME }} || true
            docker run -d \
              --name ${{ vars.CONTAINER_NAME }} \
              -p 8080:8080 \
              --restart unless-stopped \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e AWS_REGION=${{ vars.AWS_REGION }} \
              -e AWS_DEFAULT_REGION=${{ vars.AWS_REGION }} \
              -e SPRING_CLOUD_AWS_PARAMETERSTORE_REGION=${{ vars.AWS_REGION }} \
              ${{ vars.DOCKER_IMAGE }}:latest
