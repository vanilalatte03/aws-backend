spring:
  application:
    name: aws-backend-ch4
  profiles:
    active: local

management:
  endpoints:
    web:
      exposure:
        include: health

---
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:h2:mem:members
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true

---
spring:
  config:
    activate:
      on-profile: prod
    import: aws-parameterstore:/backend-ch4/prod/

management:
  endpoints:
    web:
      exposure:
        include: health,info
  info:
    env:
      enabled: true
